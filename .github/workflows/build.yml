name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches: [master1]

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:5.5.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          . /opt/esp-idf/export.sh
          idf.py build
          ls -lh build/*.bin build/bootloader/*.bin build/partition_table/*.bin 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          retention-days: 7
