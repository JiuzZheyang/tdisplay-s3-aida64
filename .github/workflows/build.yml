name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches: [master1]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF v5.5.4
        run: |
          cd /tmp
          curl -sL https://dl.espressif.com/dl/esp-idf/esp-idf-v5.5.4.zip -o esp-idf.zip
          unzip -q esp-idf.zip
          rm esp-idf.zip
          mv esp-idf-v5.5.4 /opt/esp-idf

      - name: Setup environment
        run: |
          . /opt/esp-idf/install.sh all
          . /opt/esp-idf/export.sh
          idf.py --version

      - name: Remove broken managed components
        run: |
          rm -rf managed_components

      - name: Build
        run: |
          . /opt/esp-idf/export.sh
          idf.py build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          retention-days: 7
