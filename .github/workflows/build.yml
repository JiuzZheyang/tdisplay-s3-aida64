name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches: [master1]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ESP-IDF v5.5.4 (shallow)
        run: |
          git clone --depth 1 --branch v5.5.4 \
            https://github.com/espressif/esp-idf.git /opt/esp-idf

      - name: Install ESP-IDF
        run: |
          /opt/esp-idf/install.sh all

      - name: Remove broken managed components
        run: rm -rf managed_components

      - name: Build
        run: |
          . /opt/esp-idf/export.sh
          idf.py build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          retention-days: 7
