name: Build T-Display-S3 AIDA64 Monitor

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/setup-esp-idf@v4
        with:
          version: v5.5
          components: esp_lvgl_port

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/t_display_s3_aida64.bin
          retention-days: 30

      - name: Upload bootloader
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: build/bootloader/bootloader.bin
          retention-days: 30

      - name: Upload partition table
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: partition-table
          path: build/partition_table/partition-table.bin
          retention-days: 30
