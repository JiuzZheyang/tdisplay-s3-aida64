name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches: [master1]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/setup-espidf@v1
        with:
          version: v5.5.4

      - name: Install managed components
        run: |
          . $IDF_PATH/export.sh
          rm -rf managed_components/lvgl__lvgl managed_components/espressif__esp_lvgl_port
          idf.py reconfigure

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          retention-days: 7
